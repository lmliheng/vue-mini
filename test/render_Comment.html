<!DOCTYPE html>

<head>
    <title>源码-test-render-comment</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app"></div>
</body>

<script>
    const { h, Comment, render, Text } = Vue
    const vnode = h(Comment, 'hello vue')
    console.log(vnode)

    render(vnode, document.querySelector('#app'))

    // 不支持动态更新
    setTimeout(() => {
        const vnode1 = h(Comment, 'test')
        render(vnode1, document.querySelector('#app'))
    }, 5000)
</script>

</html>
