<!DOCTYPE html>

<head>
    <title>源码-test-watch</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <p id="p1"></p>
        <p id="p2"></p>
    </div>
</body>

<script>
    const { ref, watch, reactive } = Vue

    let info = reactive({
        name: '威龙'
    })

    console.log(info)

    watch(info, (newVal, oldVal) => {
        console.log('监听到数据变化,新值为:', newVal, '旧值为:', oldVal)
    })
    setTimeout(() => {
        info.name = '哈哈'
    }, 3000)

</script>

</html>
