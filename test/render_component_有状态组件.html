<!DOCTYPE html>

<head>
    <title>源码-test-render-响应式组件</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app"></div>
</body>

<script>
    const { h, Fragment, render } = Vue

    const component = {
        data() {
            return {
                msg: 'hello vue 响应式组件'
            }

        },

        render() {
            return h('h1', {
                style: {
                    color: 'red',

                }
            }, this.msg)
        }
    }
    const vnode = h(component)
    // vnode type是一个object shapeFlag=4
    console.log(vnode)
    render(vnode, document.querySelector('#app'))

    // setTimeout(() => {
    //     const vnode1 = h(Comment, 'test')
    //     render(vnode1, document.querySelector('#app'))
    // }, 5000)
</script>

</html>
