<!DOCTYPE html>

<head>
    <title>源码-test-ref-shallow</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <p id="p1"></p>
        <p id="p2"></p>
    </div>
</body>

<script>
    const { ref, effect } = Vue
    debugger
    let info = ref('张三')
    let info2 = ref({ name: '张三' })

    console.log(info)

    effect(() => {
        document.querySelector('#p1').innerHTML = info.value
    })

    effect(() => {
        document.querySelector('#p2').innerHTML = info.value
    })

    setTimeout(() => {
        info.value = '李四'
    }, 5000)

</script>

</html>
