<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-h_props有style的情况</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app"></div>

</body>

<script>
    const { h, render } = Vue

    const vnode = h('div', {
        style: {
            border: '1px solid rgba(0,0,0,0.5)',
            color: 'red',
            width: '20px',
            hight: '30px'
        },
        id: '10'
    }, 'welcome to vue')
    console.log(vnode)
    render(vnode, document.querySelector('#app'))

</script>

</html>
