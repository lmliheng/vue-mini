<!DOCTYPE html>

<head>
    <title>test-render-Text</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app"></div>
</body>

<script>
    const { h, Text, render } = Vue
    const vnode = h(Text, 'hello vue')
    console.log(vnode)

    render(vnode, document.querySelector('#app'))


    setTimeout(() => {
        const vnode1 = h(Text, 'test')
        render(vnode1, document.querySelector('#app'))
    }, 2000)
</script>

</html>
