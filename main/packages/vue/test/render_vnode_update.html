<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-h_vnode更新,dom更新</title>
    <script src="../dist/vue.js"></script>
</head>

<body>

<script>
    const { h, render } = Vue

    const vnode = h('div', { class: 'container' }, 'hello vuejs')

        }
        , 2000)
