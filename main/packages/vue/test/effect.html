<!DOCTYPE html>

<head>
    <title>test-effect</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app"></div>
</body>

<script>
    const { reactive, effect } = Vue
    let info = reactive({ name: '张三', age: 18 })

    effect(() => {
        document.querySelector('#app').innerHTML = info.name
    })

    setTimeout(() => {
        info.name = '李四'
    }, 5000)

</script>

</html>
