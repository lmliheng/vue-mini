<!DOCTYPE html>

<head>
    <title>test-scheduler</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <p id="p1"></p>
        <p id="p2"></p>
    </div>
</body>

<script>
    const { ref, effect } = Vue

    let info = ref('张三')
    let num = ref(1)

    //console.log(info)

    // 输出顺序：1 over 2
    effect(() => {
        console.log(num.value)
    }, {
        scheduler() {
            setTimeout(() => {
                console.log(num.value)
            }, 2000)
        }
    })

    num.value = 2

    console.log('over')



</script>

</html>
