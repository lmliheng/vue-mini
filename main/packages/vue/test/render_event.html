<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-render + 事件</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app"></div>
    <button onclick="alert('test')">click</button>

</body>

<script>
    const { h, render } = Vue

    const vnode = h('button', { onClick() { alert('test') }, }, 'click')
    console.log(vnode)
    render(vnode, document.querySelector('#app'))

</script>

</html>
