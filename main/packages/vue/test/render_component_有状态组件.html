<!DOCTYPE html>

<head>
    <title>test-render-响应式组件</title>
    <script src="../dist/vue.js"></script>
</head>

<body>
    <div id="app"></div>
</body>

<script>

    const { h, Fragment, render } = Vue
    //NOTE： 把这种含data的组件 叫有状态组件
    const component = {
        data() {
            return {
                msg: 'hello vue 响应式组件'
            }

        },

        render() {
            return h('h1', {
                style: {
                    color: 'red',

                }
            }, this.msg)
        }
    }
    const vnode = h(component)
    // vnode type是一个object shapeFlag=4
    console.log(vnode)
    render(vnode, document.querySelector('#app'))

    // setTimeout(() => {
    //     const vnode1 = h(Comment, 'test')
    //     render(vnode1, document.querySelector('#app'))
    // }, 5000)
</script>

</html>
